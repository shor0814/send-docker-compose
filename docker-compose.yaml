  send:
    image: '${DOCKER_SEND_IMAGE}'
    user: "2000:2000"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '1234:1234'
    volumes:
      - ./custom_assets:/app/dist/custom_assets
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - VIRTUAL_HOST=${HOST}
      - VIRTUAL_PORT=1234
      - DHPARAM_GENERATION=false
      - LETSENCRYPT_HOST=${LETSENCRYPT_HOST}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - NODE_ENV=production
      - BASE_URL=${SEND_BASE_URL}
      - PORT=1234
      - REDIS_HOST=redis
      # Site Identity
      - CUSTOM_TITLE=${CUSTOM_TITLE}
      - CUSTOM_DESCRIPTION=${CUSTOM_DESCRIPTION}
      - CUSTOM_FOOTER_TEXT=${CUSTOM_FOOTER_TEXT}
      - CUSTOM_FOOTER_URL=${CUSTOM_FOOTER_URL}
      - UI_CUSTOM_ASSETS_ICON=${UI_CUSTOM_ASSETS_ICON}

      # Visual Branding (Colors use Hex codes)
      - UI_COLOR_PRIMARY=${UI_COLOR_PRIMARY}
      - UI_COLOR_ACCENT=${UI_COLOR_ACCENT}
      - UI_CUSTOM_CSS=${UI_CUSTOM_CSS}

      # Custom Links
      - UI_FOOTER_URL=${UI_FOOTER_URL}
      - UI_PRIVACY_URL=${UI_PRIVACY_URL}
      - UI_TERMS_URL=${UI_TERMS_URL}

      # Footer links & options
      - SEND_FOOTER_CLI_URL=${SEND_FOOTER_CLI_URL}
      - SEND_FOOTER_DMCA_URL=${SEND_FOOTER_DMCA_URL}
      - SEND_FOOTER_DONATE_URL=${SEND_FOOTER_DONATE_URL}
      - SEND_FOOTER_SOURCE_URL=${SEND_FOOTER_SOURCE_URL}
      - SHOW_THUNDERBIRD_SPONSOR=${SHOW_THUNDERBIRD_SPONSOR}

      # For S3 object storage
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_USE_PATH_STYLE_ENDPOINT=${S3_USE_PATH_STYLE_ENDPOINT}

      # To customize upload limits
      # - EXPIRE_TIMES_SECONDS=3600,86400,604800,2592000,31536000
      # - DEFAULT_EXPIRE_SECONDS=3600
      # - MAX_EXPIRE_SECONDS=31536000
      # - DOWNLOAD_COUNTS=1,2,5,10,15,25,50,100,1000
      # - MAX_DOWNLOADS=1000
      # - MAX_FILE_SIZE=2684354560
  
  redis:
    image: 'redis:alpine'
    user: "2000:2000"
    command: ["redis-server", "--dir", "/data"]
    restart: always
    volumes:
      - send-redis:/data

  postgres:
    image: 'postgres:15-alpine'
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - send-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  send-redis:
  send-postgres:
    #proxy-certs:
    #proxy-vhost:
    #proxy-html:
